<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            width: 65%;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        textarea {
            width: 90%;
            height: 160px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        h1 {
            color: #111827;
        }
        .result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
        }
        .real {
            color: #166534;
            background: #dcfce7;
        }
        .fake {
            color: #991b1b;
            background: #fee2e2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fake News Detection</h1>
        <form action="/predict" method="post">
            <textarea name="news" placeholder="Enter news text here..." required>{{ input_news if input_news else '' }}</textarea><br>
            <button type="submit">Check News</button>
        </form>

        {% if prediction_text %}
            <div class="result {{ result_class }}">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
